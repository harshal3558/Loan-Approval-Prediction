<!DOCTYPE html>
<html>

<head>
    <title>Loan Approval Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 850px;
            margin: auto;
            padding: 20px;
            background: #f5f7fa;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }

        .result-container {
            margin-top: 25px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            padding: 10px;
        }

        iframe {
            width: 100%;
            height: 70px;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🏦 Loan Approval Prediction System</h1>

        <form action="/predictdata" method="POST" target="resultFrame">

            <label>Gender</label>
            <select name="Gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Married</label>
            <select name="Married" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Dependents</label>
            <select name="Dependents" required>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
            </select>

            <label>Education</label>
            <select name="Education" required>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>

            <label>Self Employed</label>
            <select name="Self_Employed" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>

            <label>Applicant Income</label>
            <input type="number" name="ApplicantIncome" placeholder="e.g. 5000" required>

            <label>Coapplicant Income</label>
            <input type="number" name="CoapplicantIncome" placeholder="e.g. 2000" required>

            <label>Loan Amount</label>
            <input type="number" name="LoanAmount" placeholder="e.g. 150" required>

            <label>Loan Term</label>
            <input type="number" name="Loan_Amount_Term" placeholder="e.g. 360" required>

            <label>Credit History</label>
            <select name="Credit_History" required>
                <option value="1.0">1 (Good)</option>
                <option value="0.0">0 (Bad)</option>
            </select>

            <label>Property Area</label>
            <select name="Property_Area" required>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>

            <button type="submit">🚀 Predict Loan Approval</button>

        </form>

        <div class="result-container">
            Prediction Result:
            <iframe name="resultFrame"></iframe>
        </div>

    </div>

</body>

</html>
